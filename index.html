<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Веб-Сайт</title>
    <meta name="description" content="Описание вашего сайта для поисковых систем.">
    
    <!-- Подключение manifest.json для PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90E2">

    <!-- Подключение внешних стилей -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="app-container">
        <h1>Добро пожаловать на сайт</h1>
        <p>Сайт готов к работе, стилизации и публикации.</p>
        <button id="action-btn">Нажми на меня</button>
    </main>

    <!-- Подключение JavaScript (в конце body для быстрой загрузки страницы) -->
    <script src="script.js"></script>
</body>
</html>
